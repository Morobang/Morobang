    <text x="85" y="238" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#3b82f6">REST API</text>
    <text x="85" y="256" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">payments</text>
  </g>

  <!-- ── EXTRACT ── -->
  <g filter="url(#gt)">
    <rect x="220" y="118" width="116" height="104" rx="10" fill="#0a1f1e" stroke="#14b8a6" stroke-width="1"/>
    <text x="278" y="148" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#14b8a6">Extract</text>
    <text x="278" y="168" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">Kafka · n8n · Glue</text>
    <text x="278" y="184" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">CDC · Batch</text>
    <text x="278" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">Streaming</text>
  </g>

