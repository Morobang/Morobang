<svg viewBox="0 0 960 480" xmlns="http://www.w3.org/2000/svg" width="960" height="480">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2d3f58" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="gb" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gt" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ga" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gp" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gc" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="480" fill="#0b0f17" rx="14"/>

  <!-- Stage header labels -->
  <text x="80"  y="26" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563" letter-spacing="2">SOURCES</text>
  <text x="278" y="26" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563" letter-spacing="2">EXTRACT</text>
  <text x="448" y="26" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563" letter-spacing="2">TRANSFORM</text>
  <text x="618" y="26" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563" letter-spacing="2">LOAD</text>
  <text x="808" y="26" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563" letter-spacing="2">DESTINATION</text>
  <line x1="30" y1="34" x2="930" y2="34" stroke="#1a2535" stroke-width="1"/>

