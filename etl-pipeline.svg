    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="1.4s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle r="4.5" fill="#14b8a6" opacity="0">
