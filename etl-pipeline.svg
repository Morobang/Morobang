    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="1.8s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#3b82f6" opacity="0">
