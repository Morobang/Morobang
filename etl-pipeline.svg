    <text x="618" y="168" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">Redshift</text>
    <text x="618" y="184" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">Snowflake · S3</text>
    <text x="618" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">BigQuery</text>
  </g>

  <!-- ── DESTINATION ── -->
  <g filter="url(#gg)">
    <rect x="730" y="134" width="110" height="72" rx="10" fill="#0a1f10" stroke="#22c55e" stroke-width="1.5"/>
    <text x="785" y="162" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#22c55e">Data</text>
    <text x="785" y="180" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#22c55e">Lakehouse</text>
    <text x="785" y="198" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">S3 + catalog</text>
