  <circle cx="70"  cy="448" r="4" fill="#22c55e"><animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/></circle>
  <text x="82"  y="452" font-family="monospace" font-size="11" fill="#94a3b8">Extract: active</text>
  <circle cx="230" cy="448" r="4" fill="#f59e0b"><animate attributeName="opacity" values="1;0.3;1" dur="1.6s" begin="0.5s" repeatCount="indefinite"/></circle>
  <text x="242" y="452" font-family="monospace" font-size="11" fill="#94a3b8">Transform: 45%</text>
  <circle cx="410" cy="448" r="4" fill="#3b82f6"><animate attributeName="opacity" values="1;0.3;1" dur="1.6s" begin="1s" repeatCount="indefinite"/></circle>
  <text x="422" y="452" font-family="monospace" font-size="11" fill="#94a3b8">Load: ready</text>
  <text x="870" y="452" text-anchor="end" font-family="monospace" font-size="11" fill="#22c55e">● 1.2M rows/run</text>

  <!-- ═══════════════════════════════════════════════════
       ANIMATED PARTICLES — pure SMIL, no JavaScript
       Each circle uses animateMotion with an mpath href
       pointing to the connector line/path above.
       Staggered begin= values create the flowing effect.
  ════════════════════════════════════════════════════ -->

  <!-- PostgreSQL → Extract (blue) -->
  <circle r="4" fill="#3b82f6" opacity="0">
    <animateMotion dur="1.8s" begin="0s" repeatCount="indefinite" calcMode="linear"><mpath href="#c-pg"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="1.8s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#3b82f6" opacity="0">
    <animateMotion dur="1.8s" begin="0.6s" repeatCount="indefinite" calcMode="linear"><mpath href="#c-pg"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#3b82f6" opacity="0">
    <animateMotion dur="1.8s" begin="1.2s" repeatCount="indefinite" calcMode="linear"><mpath href="#c-pg"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="1.8s" begin="1.2s" repeatCount="indefinite"/>
