  <line id="c-pg"  x1="140" y1="92"  x2="218" y2="145" stroke="#1e2d45" stroke-width="1.5" marker-end="url(#arr)"/>
  <line id="c-my"  x1="140" y1="170" x2="218" y2="170" stroke="#1e2d45" stroke-width="1.5" marker-end="url(#arr)"/>
  <line id="c-api" x1="140" y1="248" x2="218" y2="195" stroke="#1e2d45" stroke-width="1.5" marker-end="url(#arr)"/>
  <line id="c-et"  x1="338" y1="170" x2="388" y2="170" stroke="#1e2d45" stroke-width="1.5" marker-end="url(#arr)"/>
  <line id="c-tl"  x1="508" y1="170" x2="558" y2="170" stroke="#1e2d45" stroke-width="1.5" marker-end="url(#arr)"/>
  <line id="c-ld"  x1="678" y1="170" x2="728" y2="170" stroke="#1e2d45" stroke-width="1.5" marker-end="url(#arr)"/>
  <path id="c-la"  d="M618 230 Q618 310 420 338" stroke="#1e2d45" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path id="c-lm"  d="M618 230 Q618 310 745 338" stroke="#1e2d45" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ── SOURCE NODES ── -->
  <g filter="url(#gb)">
    <rect x="30" y="60" width="110" height="52" rx="8" fill="#0f1d2e" stroke="#3b82f6" stroke-width="1"/>
    <text x="85" y="82"  text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#3b82f6">PostgreSQL</text>
    <text x="85" y="100" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">customers</text>
  </g>
  <g filter="url(#gb)">
    <rect x="30" y="138" width="110" height="52" rx="8" fill="#0f1d2e" stroke="#3b82f6" stroke-width="1"/>
    <text x="85" y="160" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#3b82f6">MySQL</text>
    <text x="85" y="178" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">products</text>
  </g>
  <g filter="url(#gb)">
