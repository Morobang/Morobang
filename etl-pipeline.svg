  <!-- ── DOWNSTREAM DIVIDER ── -->
  <line x1="30" y1="292" x2="930" y2="292" stroke="#1a2535" stroke-width="1" stroke-dasharray="5 5"/>
  <text x="480" y="311" text-anchor="middle" font-family="monospace" font-size="10" fill="#2d3f58" letter-spacing="3">DOWNSTREAM CONSUMERS</text>

  <!-- ── ANALYTICS ── -->
  <g filter="url(#gp)">
    <rect x="200" y="328" width="220" height="80" rx="10" fill="#180f2e" stroke="#a855f7" stroke-width="1"/>
    <text x="310" y="356" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#a855f7">Analytics &amp; Dashboards</text>
    <text x="310" y="376" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">Power BI · Tableau · Streamlit</text>
    <text x="310" y="392" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">Looker · Metabase</text>
