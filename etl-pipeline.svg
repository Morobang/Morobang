    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle r="4.5" fill="#f59e0b" opacity="0">
    <animateMotion dur="1.4s" begin="1.05s" repeatCount="indefinite" calcMode="linear"><mpath href="#c-tl"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="1.4s" begin="1.05s" repeatCount="indefinite"/>
