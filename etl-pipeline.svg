  <g filter="url(#ga)">
    <rect x="390" y="118" width="116" height="104" rx="10" fill="#1f160a" stroke="#f59e0b" stroke-width="1"/>
    <text x="448" y="148" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#f59e0b">Transform</text>
    <text x="448" y="168" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">dbt · Spark</text>
    <text x="448" y="184" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">Python · SQL</text>
    <text x="448" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">Clean · Join · Agg</text>
