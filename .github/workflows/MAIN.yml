# GitHub Action for generating a contribution graph with a snake eating your contributions.
name: Generate Snake

# Controls when the action will run
on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# The sequence of runs in this workflow
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Checks out your repository under $GITHUB_WORKSPACE
      - name: Checkout repo
        uses: actions/checkout@v4  # Updated from v2 to v4
      
      # Generates the snake animation
      - name: Generate snake animation
        uses: Platane/snk@v3  # Updated from master to v3
        id: snake
        with:
          github_user_name: Morobang  # Changed from mishmanners to YOUR username
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
      
      # Shows the status of the build (helps with debugging)
      - name: Show status
        run: git status
      
      # Push the generated files to the 'output' branch
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4  # Updated from v2.1.3 to v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore: update snake animation"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
